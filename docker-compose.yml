services:
  mysql:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: database-1
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - my-network

  tomcat:
    image: tomcat:10.0
    container_name: tomcat-server
    restart: always
    depends_on:
      - mysql
    ports:
      - "8081:8080"
    volumes:
      - /mnt/project/LoginWebApp/target:/usr/local/tomcat/webapps
    networks:
      - my-network

volumes:
  mysql_data:

networks:
  my-network:
    driver: bridge
